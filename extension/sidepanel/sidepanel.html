<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps 数据面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header svg { width: 22px; height: 22px; color: #fff; }
    .header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .header .count {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      color: #fff;
    }

    .toolbar {
      padding: 12px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border: none;
      color: #fff;
    }
    .btn-primary:hover { box-shadow: 0 2px 12px rgba(59,130,246,0.3); color: #fff; }

    .spacer { flex: 1; }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 140px);
    }
    .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: transparent; }
    .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead { position: sticky; top: 0; z-index: 10; }
    th {
      background: #1e293b;
      padding: 10px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      white-space: nowrap;
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:hover td { background: rgba(255,255,255,0.03); }

    td.name { font-weight: 500; color: #f1f5f9; }
    td.address { color: #94a3b8; }
    td.phone { color: #94a3b8; }
    td.rating { color: #fbbf24; font-weight: 600; }
    td.reviews { color: #94a3b8; }
    td.website a {
      color: #60a5fa;
      text-decoration: none;
    }
    td.website a:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }
    .empty svg {
      width: 48px; height: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }
    .empty p { font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <h1>采集数据</h1>
      <span class="count" id="dataCount">0 条</span>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" id="btnExportCSV" disabled>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      导出 CSV
    </button>
    <button class="btn btn-primary" id="btnExportExcel" disabled>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      导出 Excel
    </button>
    <span class="spacer"></span>
    <button class="btn" id="btnRefresh">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      刷新
    </button>
    <button class="btn" id="btnClear">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      清除
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>商家名称</th>
          <th>地址</th>
          <th>电话</th>
          <th>评分</th>
          <th>评论数</th>
          <th>网站</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty">
          <td colspan="7">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
            <p>暂无数据</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
